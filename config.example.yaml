# create-agent configuration template
# Copy this file to config.yaml and fill in your settings.
#
# API keys use ${ENV_VAR} syntax to read from environment variables.
# You can also put the key directly (not recommended for security).

# ── LLM Provider (OpenAI-compatible standard) ───────
llm:
  # Base URL for the API endpoint.
  # Change this to use different providers:
  #   OpenAI:           https://api.openai.com/v1
  #   DeepSeek:         https://api.deepseek.com/v1
  #   Qwen (阿里云):     https://dashscope.aliyuncs.com/compatible-mode/v1
  #   Zhipu (智谱):     https://open.bigmodel.cn/api/paas/v4
  #   Moonshot (月之暗面): https://api.moonshot.cn/v1
  #   vLLM (本地):       http://localhost:8000/v1
  #   Ollama (本地):     http://localhost:11434/v1
  base_url: https://api.openai.com/v1

  # API key — use ${OPENAI_API_KEY} to read from environment
  api_key: ${OPENAI_API_KEY}

  # Model name — any model supported by the provider
  model: gpt-4o

  # Maximum output tokens per response
  max_tokens: 16000

  # Temperature (0.0 = deterministic, 1.0 = creative)
  temperature: 0.0

# ── API Keys ────────────────────────────────────────
# Set these as environment variables and reference with ${VAR_NAME}
api_keys:
  openai: ${OPENAI_API_KEY}        # Required: your LLM API key
  tavily: ${TAVILY_API_KEY}        # Required for web search

# ── Tool Configuration ──────────────────────────────
tools:
  web_search:
    enabled: true                  # Set to false to disable web search
    max_results: 5                 # Default results per search (1-20)
    include_domains: []            # Restrict search to these domains
    exclude_domains: []            # Block these domains from results

  classification:
    batch_size: 10                 # Documents per classification call
    max_chars_per_doc: 8000        # Truncate document text for classification

# ── Extraction Settings ─────────────────────────────
extraction:
  pdf_library: pdfplumber          # pdfplumber (recommended) or pymupdf
  max_chars_per_doc: 50000         # Hard cap on total extracted characters
  supported_extensions:            # File types to process
    - .docx
    - .pptx
    - .pdf

# ── Agent Behavior ──────────────────────────────────
agent:
  max_iterations: 20               # Max tool-calling loop iterations
  verbose: false                   # Show detailed tool execution logs
  stream_output: true              # Stream LLM responses to terminal
